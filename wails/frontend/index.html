<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialFlow Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    /* ========== SPLASH SCREEN ========== */
    .splash {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s, visibility 0.5s;
    }
    .splash.hide {
      opacity: 0;
      visibility: hidden;
    }
    .splash-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 32px;
      color: white;
      margin-bottom: 24px;
      animation: logoIn 0.6s ease-out;
      box-shadow: 0 0 40px rgba(59,130,246,0.3);
    }
    @keyframes logoIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .splash-name {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
      animation: fadeUp 0.6s ease-out 0.2s both;
    }
    .splash-sub {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease-out 0.3s both;
    }
    @keyframes fadeUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .splash-loader {
      width: 200px;
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
      animation: fadeUp 0.6s ease-out 0.4s both;
    }
    .splash-loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
      animation: loading 1.2s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .splash-status {
      margin-top: 16px;
      font-size: 12px;
      color: #475569;
      animation: fadeUp 0.6s ease-out 0.5s both;
    }
    .splash-version {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: #334155;
    }

    /* ========== HEADER ========== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      --wails-draggable: drag;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 16px; color: white;
    }
    .app-name { font-size: 16px; font-weight: 600; color: #f1f5f9; }
    .app-version { font-size: 11px; color: #64748b; margin-left: 4px; }

    /* Status */
    .status-bar { display: flex; align-items: center; gap: 8px; --wails-draggable: no-drag; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444; transition: background 0.3s;
    }
    .status-dot.running {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
    .status-text { font-size: 13px; color: #94a3b8; }

    /* User bar */
    .user-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px; background: #162032;
      border-bottom: 1px solid #334155; font-size: 12px;
    }
    .user-email { color: #7dd3fc; display: flex; align-items: center; gap: 6px; }
    .user-email::before {
      content: ''; display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #22c55e;
    }
    .btn-logout {
      background: none; border: 1px solid #334155; color: #64748b;
      padding: 3px 10px !important; font-size: 11px !important;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    /* Login */
    .login-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-box {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 36px 40px; width: 340px;
    }
    .login-title { font-size: 18px; font-weight: 600; color: #f1f5f9; margin-bottom: 4px; }
    .login-subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
    .form-input {
      width: 100%; padding: 9px 12px; background: #0f172a;
      border: 1px solid #334155; border-radius: 8px;
      color: #e2e8f0; font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #3b82f6; }
    .form-input::placeholder { color: #475569; }
    .login-error { color: #f87171; font-size: 12px; margin-bottom: 12px; display: none; }
    .btn-login {
      width: 100%; padding: 10px; background: #3b82f6; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn-login:hover:not(:disabled) { background: #2563eb; }
    .btn-login:disabled { background: #1e3a5f; color: #475569; cursor: not-allowed; }

    /* Controls */
    .controls {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; background: #1e293b; border-bottom: 1px solid #334155;
    }
    button {
      padding: 6px 16px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-start { background: #22c55e; color: white; }
    .btn-start:hover:not(:disabled) { background: #16a34a; }
    .btn-start:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-stop { background: #ef4444; color: white; }
    .btn-stop:hover:not(:disabled) { background: #dc2626; }
    .btn-stop:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-clear { background: #334155; color: #94a3b8; margin-left: auto; }
    .btn-clear:hover { background: #475569; color: #e2e8f0; }

    /* Stats */
    .stats { display: flex; gap: 16px; margin-left: 16px; padding-left: 16px; border-left: 1px solid #334155; }
    .stat { text-align: center; }
    .stat-value { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Logs */
    .logs {
      flex: 1; overflow-y: auto; padding: 8px 0;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px; line-height: 1.6;
    }
    .logs::-webkit-scrollbar { width: 6px; }
    .logs::-webkit-scrollbar-track { background: transparent; }
    .logs::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .logs::-webkit-scrollbar-thumb:hover { background: #475569; }
    .log-entry { padding: 1px 20px; display: flex; gap: 8px; transition: background 0.1s; }
    .log-entry:hover { background: rgba(255,255,255,0.03); }
    .log-time { color: #475569; flex-shrink: 0; font-size: 11px; }
    .log-text { word-break: break-all; }
    .log-entry.error .log-text { color: #f87171; }
    .log-entry.warn .log-text { color: #fbbf24; }
    .log-entry.success .log-text { color: #4ade80; }
    .log-entry.info .log-text { color: #cbd5e1; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: #475569; gap: 8px;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.3; }

    .hidden { display: none !important; }

    /* Update banner */
    .update-banner {
      display: none; align-items: center; justify-content: space-between;
      padding: 8px 20px; background: linear-gradient(90deg, #1e3a5f, #1e293b);
      border-bottom: 1px solid #334155; font-size: 12px;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .update-banner.show { display: flex; }
    .update-info { display: flex; align-items: center; gap: 8px; color: #fbbf24; }
    .update-info .badge { background: #f59e0b; color: #0f172a; padding: 1px 8px; border-radius: 10px; font-weight: 700; font-size: 10px; }
    .update-summary { color: #94a3b8; font-size: 11px; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-update {
      background: #f59e0b; color: #0f172a; border: none; padding: 4px 14px; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-update:hover { background: #eab308; }
    .btn-update:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-dismiss { background: none; border: none; color: #475569; cursor: pointer; font-size: 16px; padding: 0 4px; margin-left: 8px; }
    .btn-dismiss:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <!-- ========== SPLASH SCREEN ========== -->
  <div class="splash" id="splashScreen">
    <div class="splash-logo">SF</div>
    <div class="splash-name">SocialFlow Agent</div>
    <div class="splash-sub">Social Media Automation Platform</div>
    <div class="splash-loader"><div class="splash-loader-bar"></div></div>
    <div class="splash-status" id="splashStatus">Dang khoi dong...</div>
    <div class="splash-version" id="splashVersion">v2.0.0</div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div class="header">
    <div class="header-left">
      <div class="logo">SF</div>
      <span class="app-name">SocialFlow Agent</span>
      <span class="app-version" id="appVersion">v2.0.0</span>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Stopped</span>
    </div>
  </div>

  <!-- Update banner -->
  <div class="update-banner" id="updateBanner">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="update-info">
        <span class="badge">NEW</span>
        <span id="updateText">Co ban cap nhat moi</span>
      </div>
      <span class="update-summary" id="updateSummary"></span>
    </div>
    <div style="display:flex; align-items:center;">
      <button class="btn-update" id="btnUpdate" onclick="applyUpdate()">Cap nhat</button>
      <button class="btn-dismiss" onclick="dismissUpdate()" title="Bo qua">&times;</button>
    </div>
  </div>

  <!-- User bar -->
  <div class="user-bar hidden" id="userBar">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" onclick="logout()">Dang xuat</button>
  </div>

  <!-- Login -->
  <div class="login-screen hidden" id="loginScreen">
    <div class="login-box">
      <div class="login-title">Dang nhap SocialFlow</div>
      <div class="login-subtitle">Dang nhap de bat dau xu ly jobs</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="inputEmail" placeholder="email@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Mat khau</label>
        <input class="form-input" type="password" id="inputPassword" placeholder="........" autocomplete="current-password" />
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Dang nhap</button>
    </div>
  </div>

  <!-- Main UI -->
  <div id="mainUI" class="hidden" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
    <div class="controls">
      <button class="btn-start" id="btnStart" onclick="startAgent()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
        Start
      </button>
      <button class="btn-stop" id="btnStop" disabled onclick="stopAgent()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="logCount">0</div>
          <div class="stat-label">Logs</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="errorCount">0</div>
          <div class="stat-label">Errors</div>
        </div>
      </div>
      <button class="btn-clear" onclick="clearLogs()">Clear</button>
    </div>
    <div class="logs" id="logsContainer">
      <div class="empty-state" id="emptyState">
        <div class="icon">&#9881;</div>
        <div>Nhan Start de ket noi agent</div>
      </div>
    </div>
  </div>

  <script>
    // ========== WAILS RUNTIME BRIDGE ==========
    // Wails v2 injects runtime automatically at /wails/runtime.js
    // Go methods are available at window.go.main.App.*

    let isRunning = false
    let totalErrors = 0

    // Helper: call Go backend method
    async function goCall(method, ...args) {
      try {
        return await window['go']['main']['App'][method](...args)
      } catch (err) {
        console.error(`[Wails] ${method} failed:`, err)
        return null
      }
    }

    // ========== SPLASH CONTROL ==========
    function setSplashStatus(text) {
      const el = document.getElementById('splashStatus')
      if (el) el.textContent = text
    }

    function hideSplash() {
      const splash = document.getElementById('splashScreen')
      splash.classList.add('hide')
      setTimeout(() => splash.style.display = 'none', 500)
    }

    // ========== UI UPDATES ==========
    function updateUI(running) {
      isRunning = running
      document.getElementById('statusDot').className = `status-dot ${running ? 'running' : ''}`
      document.getElementById('statusText').textContent = running ? 'Running' : 'Stopped'
      document.getElementById('statusText').style.color = running ? '#4ade80' : '#94a3b8'
      document.getElementById('btnStart').disabled = running
      document.getElementById('btnStop').disabled = !running
    }

    function showLoggedIn(user) {
      document.getElementById('loginScreen').classList.add('hidden')
      const mainUI = document.getElementById('mainUI')
      mainUI.classList.remove('hidden')
      mainUI.style.display = 'flex'
      document.getElementById('userBar').classList.remove('hidden')
      document.getElementById('userEmail').textContent = user.email
    }

    function showLoggedOut() {
      document.getElementById('loginScreen').classList.remove('hidden')
      document.getElementById('loginScreen').style.display = 'flex'
      const mainUI = document.getElementById('mainUI')
      mainUI.classList.add('hidden')
      mainUI.style.display = 'none'
      document.getElementById('userBar').classList.add('hidden')
      updateUI(false)
    }

    // ========== AUTH ==========
    async function doLogin() {
      const email = document.getElementById('inputEmail').value.trim()
      const password = document.getElementById('inputPassword').value
      const errEl = document.getElementById('loginError')
      const btn = document.getElementById('btnLogin')

      if (!email || !password) {
        errEl.textContent = 'Vui long nhap email va mat khau'
        errEl.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Dang dang nhap...'
      errEl.style.display = 'none'

      const res = await goCall('Login', email, password)

      if (!res || res.error) {
        errEl.textContent = res?.error || 'Login failed'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Dang nhap'
        return
      }

      showLoggedIn(res.user)
    }

    async function logout() {
      await goCall('Logout')
      showLoggedOut()
      document.getElementById('inputPassword').value = ''
    }

    // ========== LOGS ==========
    function addLogEntry(entry) {
      const container = document.getElementById('logsContainer')
      const empty = document.getElementById('emptyState')
      if (empty) empty.remove()

      const div = document.createElement('div')
      div.className = `log-entry ${entry.type}`
      const time = new Date(entry.time)
      const timeStr = time.toLocaleTimeString('vi-VN', { hour12: false })
      div.innerHTML = `<span class="log-time">${timeStr}</span><span class="log-text">${escapeHtml(entry.text)}</span>`
      container.appendChild(div)
      container.scrollTop = container.scrollHeight

      document.getElementById('logCount').textContent = container.children.length
      if (entry.type === 'error') {
        totalErrors++
        document.getElementById('errorCount').textContent = totalErrors
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    // ========== AGENT CONTROL ==========
    async function startAgent() { await goCall('StartAgent') }
    async function stopAgent() { await goCall('StopAgent') }
    async function clearLogs() {
      await goCall('ClearLogs')
      document.getElementById('logsContainer').innerHTML = ''
      totalErrors = 0
      document.getElementById('logCount').textContent = '0'
      document.getElementById('errorCount').textContent = '0'
    }

    // Enter key
    document.getElementById('inputPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin()
    })
    document.getElementById('inputEmail').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('inputPassword').focus()
    })

    // ========== UPDATE ==========
    function showUpdateBanner(info) {
      document.getElementById('updateText').textContent = `Co ban cap nhat moi (${info.behind || 'new'} commits)`
      const firstLine = (info.summary || '').split('\n')[0]
      document.getElementById('updateSummary').textContent = firstLine
      document.getElementById('updateBanner').classList.add('show')
    }

    function dismissUpdate() {
      document.getElementById('updateBanner').classList.remove('show')
    }

    async function applyUpdate() {
      const btn = document.getElementById('btnUpdate')
      btn.disabled = true
      btn.textContent = 'Dang cap nhat...'
      await goCall('ApplyUpdate')
    }

    // ========== WAILS EVENT LISTENERS ==========
    function setupEvents() {
      window.runtime.EventsOn('log', (entry) => addLogEntry(entry))
      window.runtime.EventsOn('status', (s) => updateUI(s.running))
      window.runtime.EventsOn('user', (u) => {
        if (u) showLoggedIn(u)
        else showLoggedOut()
      })
      window.runtime.EventsOn('auto-login-failed', (email) => {
        if (email) document.getElementById('inputEmail').value = email
      })
      window.runtime.EventsOn('update-available', (info) => showUpdateBanner(info))
      window.runtime.EventsOn('update-result', (result) => {
        const btn = document.getElementById('btnUpdate')
        if (result.success) {
          btn.textContent = 'Dang khoi dong lai...'
        } else {
          btn.disabled = false
          btn.textContent = 'Cap nhat'
          addLogEntry({ time: new Date().toISOString(), text: `Cap nhat that bai: ${result.message}`, type: 'error' })
        }
      })
      window.runtime.EventsOn('setup-progress', (msg) => {
        const el = document.getElementById('statusText')
        if (msg) {
          el.textContent = msg
          el.style.color = '#fbbf24'
        } else {
          el.textContent = isRunning ? 'Running' : 'Stopped'
          el.style.color = isRunning ? '#4ade80' : '#94a3b8'
        }
      })
    }

    // ========== INIT ==========
    async function init() {
      setSplashStatus('Kiem tra phien dang nhap...')

      // Setup Wails event listeners
      setupEvents()

      const [status, user] = await Promise.all([
        goCall('GetStatus'),
        goCall('GetUser'),
      ])

      // Get version
      const version = await goCall('GetVersion')
      if (version) {
        document.getElementById('appVersion').textContent = `v${version}`
        document.getElementById('splashVersion').textContent = `v${version}`
      }

      setSplashStatus('San sang!')

      await new Promise(r => setTimeout(r, 800))
      hideSplash()

      if (user) {
        showLoggedIn(user)
        updateUI(status?.running || false)
        const existingLogs = await goCall('GetLogs')
        if (existingLogs) existingLogs.forEach(addLogEntry)
      } else {
        showLoggedOut()
      }
    }

    // Wait for Wails runtime to be ready
    document.addEventListener('DOMContentLoaded', () => {
      // Wails runtime loads async, poll for availability
      const check = setInterval(() => {
        if (window.go && window.go.main && window.go.main.App && window.runtime) {
          clearInterval(check)
          init()
        }
      }, 50)
      // Timeout after 5s
      setTimeout(() => clearInterval(check), 5000)
    })
  </script>
</body>
</html>
