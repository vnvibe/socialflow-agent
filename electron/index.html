<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialFlow Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      -webkit-app-region: drag;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      color: white;
    }
    .app-name {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .app-version {
      font-size: 11px;
      color: #64748b;
      margin-left: 4px;
    }

    /* Status indicator */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .status-dot.running {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .status-text {
      font-size: 13px;
      color: #94a3b8;
    }

    /* User info bar */
    .user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: #162032;
      border-bottom: 1px solid #334155;
      font-size: 12px;
    }
    .user-email {
      color: #7dd3fc;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-email::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
    }
    .btn-logout {
      background: none;
      border: 1px solid #334155;
      color: #64748b;
      padding: 3px 10px !important;
      font-size: 11px !important;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    /* Login screen */
    .login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 36px 40px;
      width: 340px;
    }
    .login-title {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 9px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #3b82f6; }
    .form-input::placeholder { color: #475569; }
    .login-error {
      color: #f87171;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .btn-login {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-login:hover:not(:disabled) { background: #2563eb; }
    .btn-login:disabled { background: #1e3a5f; color: #475569; cursor: not-allowed; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-start {
      background: #22c55e;
      color: white;
    }
    .btn-start:hover:not(:disabled) { background: #16a34a; }
    .btn-start:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-stop {
      background: #ef4444;
      color: white;
    }
    .btn-stop:hover:not(:disabled) { background: #dc2626; }
    .btn-stop:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-clear {
      background: #334155;
      color: #94a3b8;
      margin-left: auto;
    }
    .btn-clear:hover { background: #475569; color: #e2e8f0; }

    /* Stats */
    .stats {
      display: flex;
      gap: 16px;
      margin-left: 16px;
      padding-left: 16px;
      border-left: 1px solid #334155;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .stat-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Logs */
    .logs {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .logs::-webkit-scrollbar { width: 6px; }
    .logs::-webkit-scrollbar-track { background: transparent; }
    .logs::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .logs::-webkit-scrollbar-thumb:hover { background: #475569; }

    .log-entry {
      padding: 1px 20px;
      display: flex;
      gap: 8px;
      transition: background 0.1s;
    }
    .log-entry:hover { background: rgba(255,255,255,0.03); }
    .log-time {
      color: #475569;
      flex-shrink: 0;
      font-size: 11px;
    }
    .log-text { word-break: break-all; }
    .log-entry.error .log-text { color: #f87171; }
    .log-entry.warn .log-text { color: #fbbf24; }
    .log-entry.success .log-text { color: #4ade80; }
    .log-entry.info .log-text { color: #cbd5e1; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #475569;
      gap: 8px;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.3; }

    .hidden { display: none !important; }

    /* Update banner */
    .update-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: linear-gradient(90deg, #1e3a5f, #1e293b);
      border-bottom: 1px solid #334155;
      font-size: 12px;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .update-banner.show { display: flex; }
    .update-info { display: flex; align-items: center; gap: 8px; color: #fbbf24; }
    .update-info .badge { background: #f59e0b; color: #0f172a; padding: 1px 8px; border-radius: 10px; font-weight: 700; font-size: 10px; }
    .update-summary { color: #94a3b8; font-size: 11px; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-update {
      background: #f59e0b; color: #0f172a; border: none; padding: 4px 14px; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-update:hover { background: #eab308; }
    .btn-update:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-dismiss { background: none; border: none; color: #475569; cursor: pointer; font-size: 16px; padding: 0 4px; margin-left: 8px; }
    .btn-dismiss:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">SF</div>
      <span class="app-name">SocialFlow Agent</span>
      <span class="app-version">v1.0</span>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText" style="color:#fbbf24">Dang khoi dong...</span>
    </div>
  </div>

  <!-- Update banner -->
  <div class="update-banner" id="updateBanner">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="update-info">
        <span class="badge">NEW</span>
        <span id="updateText">Co ban cap nhat moi</span>
      </div>
      <span class="update-summary" id="updateSummary"></span>
    </div>
    <div style="display:flex; align-items:center;">
      <button class="btn-update" id="btnUpdate" onclick="applyUpdate()">Cap nhat</button>
      <button class="btn-dismiss" onclick="dismissUpdate()" title="Bo qua">&times;</button>
    </div>
  </div>

  <!-- User info bar (shown when logged in) -->
  <div class="user-bar hidden" id="userBar">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" onclick="logout()">Đăng xuất</button>
  </div>

  <!-- Login screen (shown when not logged in) -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-title">Đăng nhập SocialFlow</div>
      <div class="login-subtitle">Đăng nhập để bắt đầu xử lý jobs</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="inputEmail" placeholder="email@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <input class="form-input" type="password" id="inputPassword" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Đăng nhập</button>
    </div>
  </div>

  <!-- Main UI (shown when logged in) -->
  <div id="mainUI" class="hidden" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
    <div class="controls">
      <button class="btn-start" id="btnStart" onclick="startAgent()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
        Start
      </button>
      <button class="btn-stop" id="btnStop" disabled onclick="stopAgent()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="logCount">0</div>
          <div class="stat-label">Logs</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="errorCount">0</div>
          <div class="stat-label">Errors</div>
        </div>
      </div>

      <button class="btn-clear" onclick="clearLogs()">Clear</button>
    </div>

    <div class="logs" id="logsContainer">
      <div class="empty-state" id="emptyState">
        <div class="icon">&#9881;</div>
        <div>Nhấn Start để chạy agent</div>
      </div>
    </div>
  </div>

  <script>
    let isRunning = false
    let totalErrors = 0

    function updateUI(running) {
      isRunning = running
      document.getElementById('statusDot').className = `status-dot ${running ? 'running' : ''}`
      document.getElementById('statusText').textContent = running ? 'Running' : 'Stopped'
      document.getElementById('btnStart').disabled = running
      document.getElementById('btnStop').disabled = !running
    }

    function showLoggedIn(user) {
      document.getElementById('loginScreen').classList.add('hidden')
      const mainUI = document.getElementById('mainUI')
      mainUI.classList.remove('hidden')
      mainUI.style.display = 'flex'
      document.getElementById('userBar').classList.remove('hidden')
      document.getElementById('userEmail').textContent = user.email
    }

    function showLoggedOut() {
      document.getElementById('loginScreen').classList.remove('hidden')
      const mainUI = document.getElementById('mainUI')
      mainUI.classList.add('hidden')
      mainUI.style.display = 'none'
      document.getElementById('userBar').classList.add('hidden')
      updateUI(false)
    }

    async function doLogin() {
      const email = document.getElementById('inputEmail').value.trim()
      const password = document.getElementById('inputPassword').value
      const errEl = document.getElementById('loginError')
      const btn = document.getElementById('btnLogin')

      if (!email || !password) {
        errEl.textContent = 'Vui lòng nhập email và mật khẩu'
        errEl.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Đang đăng nhập...'
      errEl.style.display = 'none'

      const res = await window.agent.login(email, password)

      if (res.error) {
        errEl.textContent = res.error
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Đăng nhập'
        return
      }

      showLoggedIn(res.user)
    }

    async function logout() {
      await window.agent.logout()
      showLoggedOut()
      document.getElementById('inputPassword').value = ''
    }

    function addLogEntry(entry) {
      const container = document.getElementById('logsContainer')
      const empty = document.getElementById('emptyState')
      if (empty) empty.remove()

      const div = document.createElement('div')
      div.className = `log-entry ${entry.type}`

      const time = new Date(entry.time)
      const timeStr = time.toLocaleTimeString('vi-VN', { hour12: false })

      div.innerHTML = `<span class="log-time">${timeStr}</span><span class="log-text">${escapeHtml(entry.text)}</span>`
      container.appendChild(div)

      container.scrollTop = container.scrollHeight

      document.getElementById('logCount').textContent = container.children.length
      if (entry.type === 'error') {
        totalErrors++
        document.getElementById('errorCount').textContent = totalErrors
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    async function startAgent() {
      await window.agent.start()
    }

    async function stopAgent() {
      await window.agent.stop()
    }

    async function clearLogs() {
      await window.agent.clearLogs()
      const container = document.getElementById('logsContainer')
      container.innerHTML = ''
      totalErrors = 0
      document.getElementById('logCount').textContent = '0'
      document.getElementById('errorCount').textContent = '0'
    }

    // Enter key on password field triggers login
    document.getElementById('inputPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin()
    })
    document.getElementById('inputEmail').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('inputPassword').focus()
    })

    // Update functions
    let pendingUpdate = null

    function showUpdateBanner(info) {
      pendingUpdate = info
      const banner = document.getElementById('updateBanner')
      document.getElementById('updateText').textContent = `Co ban cap nhat moi (${info.behind} commits)`
      const firstLine = (info.summary || '').split('\n')[0]
      document.getElementById('updateSummary').textContent = firstLine
      banner.classList.add('show')
    }

    function dismissUpdate() {
      document.getElementById('updateBanner').classList.remove('show')
    }

    async function applyUpdate() {
      const btn = document.getElementById('btnUpdate')
      btn.disabled = true
      btn.textContent = 'Dang cap nhat...'
      await window.agent.applyUpdate()
    }

    async function manualCheckUpdate() {
      const result = await window.agent.checkUpdate()
      if (result.hasUpdate) {
        showUpdateBanner(result)
      } else {
        addLogEntry({ time: new Date().toISOString(), text: 'Da la phien ban moi nhat', type: 'success' })
      }
    }

    // Initialize
    async function init() {
      const [status, user] = await Promise.all([
        window.agent.getStatus(),
        window.agent.getUser(),
      ])

      if (user) {
        showLoggedIn(user)
        updateUI(status.running)
        const existingLogs = await window.agent.getLogs()
        existingLogs.forEach(addLogEntry)
      }

      window.agent.onLog(addLogEntry)
      window.agent.onStatus((s) => updateUI(s.running))
      window.agent.onUser((u) => {
        if (u) showLoggedIn(u)
        else showLoggedOut()
      })
      // Listen for update events
      window.agent.onUpdateAvailable((info) => showUpdateBanner(info))
      window.agent.onUpdateResult((result) => {
        const btn = document.getElementById('btnUpdate')
        if (result.success) {
          btn.textContent = 'Dang khoi dong lai...'
        } else {
          btn.disabled = false
          btn.textContent = 'Cap nhat'
          addLogEntry({ time: new Date().toISOString(), text: `Cap nhat that bai: ${result.message}`, type: 'error' })
        }
      })

      // Show version
      const version = await window.agent.getVersion()
      if (version) {
        document.querySelector('.app-version').textContent = `v${version}`
      }

      window.agent.onSetup((msg) => {
        const el = document.getElementById('statusText')
        if (msg) {
          el.textContent = msg
          el.style.color = '#fbbf24'
        } else {
          el.textContent = isRunning ? 'Running' : 'Stopped'
          el.style.color = '#94a3b8'
        }
      })
    }

    init()
  </script>
</body>
</html>
