<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialFlow Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      -webkit-app-region: drag;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      color: white;
    }
    .app-name {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .app-version {
      font-size: 11px;
      color: #64748b;
      margin-left: 4px;
    }

    /* Status indicator */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .status-dot.running {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .status-text {
      font-size: 13px;
      color: #94a3b8;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-start {
      background: #22c55e;
      color: white;
    }
    .btn-start:hover { background: #16a34a; }
    .btn-start:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-stop {
      background: #ef4444;
      color: white;
    }
    .btn-stop:hover { background: #dc2626; }
    .btn-stop:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-clear {
      background: #334155;
      color: #94a3b8;
      margin-left: auto;
    }
    .btn-clear:hover { background: #475569; color: #e2e8f0; }

    /* Stats */
    .stats {
      display: flex;
      gap: 16px;
      margin-left: 16px;
      padding-left: 16px;
      border-left: 1px solid #334155;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .stat-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Logs */
    .logs {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .logs::-webkit-scrollbar { width: 6px; }
    .logs::-webkit-scrollbar-track { background: transparent; }
    .logs::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .logs::-webkit-scrollbar-thumb:hover { background: #475569; }

    .log-entry {
      padding: 1px 20px;
      display: flex;
      gap: 8px;
      transition: background 0.1s;
    }
    .log-entry:hover { background: rgba(255,255,255,0.03); }
    .log-time {
      color: #475569;
      flex-shrink: 0;
      font-size: 11px;
    }
    .log-text { word-break: break-all; }
    .log-entry.error .log-text { color: #f87171; }
    .log-entry.warn .log-text { color: #fbbf24; }
    .log-entry.success .log-text { color: #4ade80; }
    .log-entry.info .log-text { color: #cbd5e1; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #475569;
      gap: 8px;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.3; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">SF</div>
      <span class="app-name">SocialFlow Agent</span>
      <span class="app-version">v1.0</span>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Stopped</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-start" id="btnStart" onclick="startAgent()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
      Start
    </button>
    <button class="btn-stop" id="btnStop" disabled onclick="stopAgent()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      Stop
    </button>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="logCount">0</div>
        <div class="stat-label">Logs</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="errorCount">0</div>
        <div class="stat-label">Errors</div>
      </div>
    </div>

    <button class="btn-clear" onclick="clearLogs()">Clear</button>
  </div>

  <div class="logs" id="logsContainer">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#9881;</div>
      <div>Agent is starting...</div>
    </div>
  </div>

  <script>
    let isRunning = false
    let totalErrors = 0

    function updateUI(running) {
      isRunning = running
      document.getElementById('statusDot').className = `status-dot ${running ? 'running' : ''}`
      document.getElementById('statusText').textContent = running ? 'Running' : 'Stopped'
      document.getElementById('btnStart').disabled = running
      document.getElementById('btnStop').disabled = !running
    }

    function addLogEntry(entry) {
      const container = document.getElementById('logsContainer')
      const empty = document.getElementById('emptyState')
      if (empty) empty.remove()

      const div = document.createElement('div')
      div.className = `log-entry ${entry.type}`

      const time = new Date(entry.time)
      const timeStr = time.toLocaleTimeString('vi-VN', { hour12: false })

      div.innerHTML = `<span class="log-time">${timeStr}</span><span class="log-text">${escapeHtml(entry.text)}</span>`
      container.appendChild(div)

      // Auto-scroll
      container.scrollTop = container.scrollHeight

      // Update counts
      document.getElementById('logCount').textContent = container.children.length
      if (entry.type === 'error') {
        totalErrors++
        document.getElementById('errorCount').textContent = totalErrors
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    async function startAgent() {
      await window.agent.start()
    }

    async function stopAgent() {
      await window.agent.stop()
    }

    async function clearLogs() {
      await window.agent.clearLogs()
      const container = document.getElementById('logsContainer')
      container.innerHTML = ''
      totalErrors = 0
      document.getElementById('logCount').textContent = '0'
      document.getElementById('errorCount').textContent = '0'
    }

    // Initialize
    async function init() {
      const status = await window.agent.getStatus()
      updateUI(status.running)

      const existingLogs = await window.agent.getLogs()
      existingLogs.forEach(addLogEntry)

      window.agent.onLog(addLogEntry)
      window.agent.onStatus((s) => updateUI(s.running))
      window.agent.onSetup((msg) => {
        const el = document.getElementById('statusText')
        if (msg) {
          el.textContent = msg
          el.style.color = '#fbbf24'
        }
      })
    }

    init()
  </script>
</body>
</html>
